<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Три богатыря — мы скоро вернёмся</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            background: radial-gradient(ellipse at 50% -10%, rgba(228,233,242,0.3) 0%, transparent 50%),
                        linear-gradient(180deg, #1C1200 0%, #0A0700 100%);
            color: #F2F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(183,192,207,0.2);
            border-radius: 20px;
            padding: 48px 32px;
            max-width: 480px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo {
            font-family: 'Sansation', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #b7c0cf, #5e697d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub { font-size: 0.9rem; color: #b7c0cf; margin-bottom: 10px; }
        h1 { font-size: 1.3rem; margin-bottom: 16px; color: #e4e9f2; font-weight: 500; }
        p { font-size: 0.95rem; color: #9a9faa; margin-bottom: 28px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #b7c0cf, #5e697d);
            color: #ffffff;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 24px rgba(183,192,207,0.4);
        }
        .note { font-size: 0.75rem; color: #6e7380; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Три богатыря</div>
        <div class="sub">Ежовик · Кордицепс · Нейробуст</div>
        <h1>Сайт временно недоступен</h1>
        <p>Мы проводим технические работы. Совсем скоро всё заработает снова.</p>
        <a href="https://t.me/biohakingwow" class="btn" target="_blank">Написать лаборанту в Telegram</a>
        <p class="note">Или напишите нам на почту: info@tribogatyrya.pro</p>
    </div>
</body>
</html>
